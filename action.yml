name: Ansible Galaxy Publish Action
description: Publish an Ansible collection or role to Galaxy with one composite action. Supports dry-run.
author: somaz94

branding:
  icon: upload-cloud
  color: red

inputs:
  type:
    description: "Publish target type: 'collection' or 'role'."
    required: true
  api_key:
    description: "Ansible Galaxy API key. Required unless dry_run is true."
    required: false
    default: ''
  namespace:
    description: "Galaxy namespace (e.g., 'somaz94'). Required for both modes."
    required: true
  name:
    description: "Collection or role name under 'namespace' (e.g., 'ansible_k8s_iac_tool' for a collection or 'ansible_kubectl_krew' for a role)."
    required: true
  working_directory:
    description: "Directory containing galaxy.yml (collection) or meta/main.yml (role)."
    required: false
    default: '.'
  python_version:
    description: "Python version installed by actions/setup-python."
    required: false
    default: '3.12'
  ansible_version:
    description: "ansible version pin for pip (e.g., '9.5.1'). Empty installs the latest."
    required: false
    default: ''
  dry_run:
    description: "When 'true', build the collection (if applicable) but skip the publish/import call. Useful for CI validation without a live API key."
    required: false
    default: 'false'

outputs:
  published_ref:
    description: "Published reference, e.g., 'collection/somaz94.ansible_k8s_iac_tool@1.2.0' or 'role/somaz94.ansible_kubectl_krew'. Prefixed with 'dry-run:' when dry_run is true."
    value: ${{ steps.publish.outputs.published_ref }}
  artifact_path:
    description: "Absolute path to the built collection tarball (collection mode only; empty for role mode)."
    value: ${{ steps.publish.outputs.artifact_path }}
  collection_version:
    description: "Version declared in galaxy.yml (collection mode only; empty for role mode)."
    value: ${{ steps.publish.outputs.collection_version }}

runs:
  using: composite
  steps:
    - name: Validate inputs
      shell: bash
      env:
        TYPE: ${{ inputs.type }}
        API_KEY: ${{ inputs.api_key }}
        NAMESPACE: ${{ inputs.namespace }}
        NAME: ${{ inputs.name }}
        WORKING_DIRECTORY: ${{ inputs.working_directory }}
        DRY_RUN: ${{ inputs.dry_run }}
      run: |
        set -euo pipefail
        echo "::group::Validate inputs"

        if [[ "$TYPE" != "collection" && "$TYPE" != "role" ]]; then
          echo "::error::input 'type' must be 'collection' or 'role' (got '$TYPE')"
          exit 1
        fi

        if [[ "$DRY_RUN" != "true" && -z "${API_KEY// }" ]]; then
          echo "::error::input 'api_key' is required when dry_run is false"
          exit 1
        fi

        if [[ -z "${NAMESPACE// }" || -z "${NAME// }" ]]; then
          echo "::error::'namespace' and 'name' are required"
          exit 1
        fi

        if [[ ! -d "$WORKING_DIRECTORY" ]]; then
          echo "::error::working_directory '$WORKING_DIRECTORY' is not a directory"
          exit 1
        fi

        echo "type=$TYPE namespace=$NAMESPACE name=$NAME dry_run=$DRY_RUN"
        echo "::endgroup::"

    - name: Set up Python
      uses: actions/setup-python@v6
      with:
        python-version: ${{ inputs.python_version }}

    - name: Install Ansible
      shell: bash
      env:
        ANSIBLE_VERSION: ${{ inputs.ansible_version }}
      run: |
        set -euo pipefail
        echo "::group::pip install ansible"
        python -m pip install --upgrade pip
        if [[ -n "$ANSIBLE_VERSION" ]]; then
          pip install "ansible==${ANSIBLE_VERSION}"
        else
          pip install ansible
        fi
        ansible --version
        echo "::endgroup::"

    - name: Publish to Galaxy
      id: publish
      shell: bash
      working-directory: ${{ inputs.working_directory }}
      env:
        TYPE: ${{ inputs.type }}
        API_KEY: ${{ inputs.api_key }}
        NAMESPACE: ${{ inputs.namespace }}
        NAME: ${{ inputs.name }}
        DRY_RUN: ${{ inputs.dry_run }}
      run: |
        set -euo pipefail

        output_line() {
          if [[ -n "${GITHUB_OUTPUT:-}" ]]; then
            echo "$1" >>"$GITHUB_OUTPUT"
          fi
        }

        summary() {
          if [[ -n "${GITHUB_STEP_SUMMARY:-}" ]]; then
            echo "$1" >>"$GITHUB_STEP_SUMMARY"
          fi
        }

        mode_label="publish"
        if [[ "$DRY_RUN" == "true" ]]; then
          mode_label="dry-run"
        fi

        if [[ "$TYPE" == "collection" ]]; then
          if [[ ! -f galaxy.yml ]]; then
            echo "::error::galaxy.yml not found in working_directory"
            exit 1
          fi

          # Extract version from galaxy.yml — PyYAML ships with ansible.
          version="$(python -c 'import sys, yaml; print(yaml.safe_load(open("galaxy.yml"))["version"])')"
          if [[ -z "$version" ]]; then
            echo "::error::failed to read 'version' from galaxy.yml"
            exit 1
          fi
          echo "collection_version=$version"
          output_line "collection_version=$version"

          echo "::group::ansible-galaxy collection build"
          ansible-galaxy collection build --force
          echo "::endgroup::"

          tarball="${NAMESPACE}-${NAME}-${version}.tar.gz"
          if [[ ! -f "$tarball" ]]; then
            echo "::error::expected tarball '$tarball' after build, but it does not exist"
            exit 1
          fi
          abs_tarball="$(pwd)/$tarball"
          output_line "artifact_path=$abs_tarball"

          ref="collection/${NAMESPACE}.${NAME}@${version}"
          if [[ "$DRY_RUN" == "true" ]]; then
            echo "::notice::dry_run=true — skipping 'ansible-galaxy collection publish'"
            output_line "published_ref=dry-run:${ref}"
          else
            echo "::group::ansible-galaxy collection publish"
            ansible-galaxy collection publish "$tarball" --api-key="$API_KEY"
            echo "::endgroup::"
            output_line "published_ref=${ref}"
          fi

          summary "### Ansible Galaxy Publish — ${mode_label}"
          summary ""
          summary "| Field | Value |"
          summary "|-------|-------|"
          summary "| Type | \`collection\` |"
          summary "| Namespace | \`${NAMESPACE}\` |"
          summary "| Name | \`${NAME}\` |"
          summary "| Version | \`${version}\` |"
          summary "| Ref | \`${ref}\` |"
          summary "| Artifact | \`${abs_tarball}\` |"
        else
          # role mode
          output_line "artifact_path="
          output_line "collection_version="

          ref="role/${NAMESPACE}.${NAME}"
          if [[ "$DRY_RUN" == "true" ]]; then
            echo "::notice::dry_run=true — skipping 'ansible-galaxy role import'"
            output_line "published_ref=dry-run:${ref}"
          else
            echo "::group::ansible-galaxy role import"
            ansible-galaxy role import --api-key "$API_KEY" "$NAMESPACE" "$NAME"
            echo "::endgroup::"
            output_line "published_ref=${ref}"
          fi

          summary "### Ansible Galaxy Publish — ${mode_label}"
          summary ""
          summary "| Field | Value |"
          summary "|-------|-------|"
          summary "| Type | \`role\` |"
          summary "| Namespace | \`${NAMESPACE}\` |"
          summary "| Name | \`${NAME}\` |"
          summary "| Ref | \`${ref}\` |"
        fi

    - name: Upload collection tarball (dry-run artifact)
      if: ${{ inputs.type == 'collection' && inputs.dry_run == 'true' }}
      uses: actions/upload-artifact@v7
      with:
        name: collection-${{ inputs.namespace }}-${{ inputs.name }}-${{ steps.publish.outputs.collection_version }}
        path: ${{ steps.publish.outputs.artifact_path }}
        if-no-files-found: error
        retention-days: 7
