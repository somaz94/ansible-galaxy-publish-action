name: CI

on:
  push:
    branches: [main]
    paths-ignore:
      - '**/*.md'
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install linters
        run: |
          python -m pip install --upgrade pip
          pip install yamllint

      - name: Run yamllint
        run: yamllint -d relaxed action.yml .github/workflows/ tests/

      - name: Run actionlint
        uses: raven-actions/actionlint@v2
        with:
          cache: true

  test-collection:
    name: Test Action (collection, dry-run)
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v6

      - name: Run action (collection dry-run) against fixture
        id: galaxy
        uses: ./
        with:
          type: collection
          dry_run: true
          working_directory: tests/fixtures/sample_collection
          namespace: somaz94
          name: sample_collection

      - name: Verify outputs
        run: |
          REF='${{ steps.galaxy.outputs.published_ref }}'
          ART='${{ steps.galaxy.outputs.artifact_path }}'
          VER='${{ steps.galaxy.outputs.collection_version }}'
          echo "published_ref=${REF}"
          echo "artifact_path=${ART}"
          echo "collection_version=${VER}"

          expected_ref='dry-run:collection/somaz94.sample_collection@0.0.1'
          if [[ "${REF}" != "${expected_ref}" ]]; then
            echo "::error::expected published_ref='${expected_ref}', got '${REF}'"
            exit 1
          fi
          if [[ "${VER}" != "0.0.1" ]]; then
            echo "::error::expected collection_version='0.0.1', got '${VER}'"
            exit 1
          fi
          if [[ -z "${ART}" || ! -f "${ART}" ]]; then
            echo "::error::artifact_path '${ART}' missing or not a file"
            exit 1
          fi
          echo "[PASS] collection dry-run"

      - name: Download the uploaded artifact to verify upload worked
        uses: actions/download-artifact@v8
        with:
          name: collection-somaz94-sample_collection-0.0.1
          path: /tmp/verify-artifact

      - name: Assert downloaded tarball matches
        run: |
          ls -la /tmp/verify-artifact
          test -f /tmp/verify-artifact/somaz94-sample_collection-0.0.1.tar.gz
          echo "[PASS] artifact upload/download round-trip"

  test-role:
    name: Test Action (role, dry-run)
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v6

      - name: Run action (role dry-run) against fixture
        id: galaxy
        uses: ./
        with:
          type: role
          dry_run: true
          working_directory: tests/fixtures/sample_role
          namespace: somaz94
          name: sample_role

      - name: Verify outputs
        run: |
          REF='${{ steps.galaxy.outputs.published_ref }}'
          ART='${{ steps.galaxy.outputs.artifact_path }}'
          VER='${{ steps.galaxy.outputs.collection_version }}'
          echo "published_ref=${REF}"
          echo "artifact_path=${ART}"
          echo "collection_version=${VER}"

          expected='dry-run:role/somaz94.sample_role'
          if [[ "${REF}" != "${expected}" ]]; then
            echo "::error::expected published_ref='${expected}', got '${REF}'"
            exit 1
          fi
          if [[ -n "${ART}" ]]; then
            echo "::error::expected artifact_path to be empty in role mode, got '${ART}'"
            exit 1
          fi
          if [[ -n "${VER}" ]]; then
            echo "::error::expected collection_version to be empty in role mode, got '${VER}'"
            exit 1
          fi
          echo "[PASS] role dry-run"

  ci-result:
    name: CI Result
    if: always()
    needs: [lint, test-collection, test-role]
    runs-on: ubuntu-latest
    steps:
      - name: Check results
        run: |
          if [[ "${{ needs.lint.result }}" != "success" ]]; then
            echo "::error::lint failed"
            exit 1
          fi
          if [[ "${{ needs.test-collection.result }}" != "success" ]]; then
            echo "::error::test-collection failed"
            exit 1
          fi
          if [[ "${{ needs.test-role.result }}" != "success" ]]; then
            echo "::error::test-role failed"
            exit 1
          fi
          echo "All CI jobs passed"
